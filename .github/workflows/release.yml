name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Optional signing secrets (set in GitHub repo Settings → Secrets):
#   APPLE_CERTIFICATE          - Base64-encoded .p12 Developer ID certificate
#   APPLE_CERTIFICATE_PASSWORD - Password for the .p12 file
#   APPLE_ID                   - Apple Developer account email
#   APPLE_PASSWORD             - App-specific password for notarization
#   APPLE_TEAM_ID              - Apple Developer Team ID
# Without these, the build will be unsigned. Users will need to allow it
# in System Settings → Privacy & Security → "Open Anyway".

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # Cache Rust build artifacts — cuts subsequent runs from ~20min to ~5min
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Bun is required for build:sidecars (cast-server + cast-lsp-ts sidecar binaries)
      - uses: oven-sh/setup-bun@v2

      # cargo-binstall downloads pre-built tauri-cli binary (~30s vs ~10min for cargo install)
      - uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: cargo binstall tauri-cli@^2 --no-confirm

      - name: Install Node dependencies
        run: npm ci

      # server/ has its own package.json with @types/express — needed for tsc -b
      - name: Install server dependencies
        run: cd server && npm install

      - name: Build macOS app
        run: cargo tauri build --target aarch64-apple-darwin --bundles dmg
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # When --target is specified, Tauri outputs to target/<triple>/release/bundle/
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          generate_release_notes: true
