name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Optional signing secrets (set in GitHub repo Settings → Secrets):
#   APPLE_CERTIFICATE          - Base64-encoded .p12 Developer ID certificate
#   APPLE_CERTIFICATE_PASSWORD - Password for the .p12 file
#   APPLE_ID                   - Apple Developer account email
#   APPLE_PASSWORD             - App-specific password for notarization
#   APPLE_TEAM_ID              - Apple Developer Team ID
# Without these, the build will be unsigned. Users will need to allow it
# in System Settings → Privacy & Security → "Open Anyway".

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: cargo tauri build
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
